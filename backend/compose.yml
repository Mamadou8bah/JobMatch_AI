services:
  db:
    image: postgres:16-alpine
    container_name: jobmatch-db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: jobmatch-api
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production

    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma generate &&
        node dist/main.js
      "

    ports:
      - "3000:3000"


volumes:
  postgres_data:
